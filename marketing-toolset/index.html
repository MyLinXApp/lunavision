<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Umgezogen: KI-Content-Agent | LunaVision</title>
  <!-- Seite umbenannt: "Marketing-Toolset" heißt jetzt "KI-Content-Agent".
       Statisches Hosting (GitHub Pages) erlaubt keine echten 301-Redirects,
       daher hier: Canonical + Meta-Refresh als bestmögliche Alternative,
       damit Suchmaschinen/KI-Modelle das Ranking-Signal auf die neue URL übertragen. -->
  <link rel="canonical" href="https://lunavision.org/ki-content-agent" />
  <meta http-equiv="refresh" content="0; url=/ki-content-agent" />
  <meta name="robots" content="noindex, follow" />
</head>
<body>
  <p>Diese Seite heißt jetzt <a href="/ki-content-agent">KI-Content-Agent</a>. Falls die Weiterleitung nicht automatisch funktioniert, bitte auf den Link klicken.</p>
</body>
</html>
